<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>replit</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
<h1>Banana Bread</h1>


  <table style="width:90%">
    <tr>
      <th>Ingredient Name</th>
      <th>Amount</th>
      <th>Picture of ingredient</th>
    </tr>
    <tr>
      <td>Bananas</td>
      <td>3 (the more you add the more moist it is)</td>
      <td><img src="ing/ban.png" alt="ban"></td>
    </tr>
    <tr>
      <td>Butter</td>
      <td>1/3 cups</td>
      <td><img src="ing/butter.jpg" alt="butter"></td>
    </tr>
    <tr>
      <td>Baking soda</td>
      <td>1/2 teaspoons</td>
      <td><img src="ing/chips.jpg" alt="chips"></td>
    </tr>
    <tr>
      <td>Salt</td>
      <td>1 pinch</td>
      <td><img src="ing/salt.jpg" alt="salt"></td>
    </tr>
<tr>
        <td >Sugar</td>
        <td >3/4 cups</td>
        <td><img src="ing/sugar.jpg" alt="surgar"></td>
      </tr>
    <tr>
        <td >Egg beaten</td>
        <td >1</td>
        <td><img src="ing/egg.jpg" alt="egg"></td>
      </tr>
    <tr>
        <td >Vanilla Extract</td>
        <td >1 teaspoon</td>
        <td><img src="ing/vinila.jpg" alt="vin"></td>
      </tr>
    <tr>
        <td >All-Purpose Flour</td>
        <td >1 and 1/2 cup</td>
        <td><img src="ing/flour.jpeg" alt="flour"></td>
      </tr>

  </table>

<i><a href="index.html">return home</a></i>



  <script src="script.js"></script>

  <!--
  This script places a badge on your repl's full-browser view back to your repl's cover
  page. Try various colors for the theme: dark, light, red, orange, yellow, lime, green,
  teal, blue, blurple, magenta, pink!
  -->
  <script src="https://replit.com/public/js/replit-badge.js" theme="blue" defer></script>
</body>

</html>
